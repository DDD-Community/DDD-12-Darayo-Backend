spring:
  application:
    name: festival

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: true


auth:
  password: ${ADMIN_PASSWORD}

springdoc:
  use-fqn: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

jwt:
  secret-key: ${JWT_SECRET_KEY:default-secret-key-for-local-environment}
  expire-length: ${JWT_EXPIRE_LENGTH:86400000}